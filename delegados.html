<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Delegados | EPET 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bg-lista-azul {
            background-color: #1d4ed8;
        }

        .text-lista-azul {
            color: #1d4ed8;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <!-- Navegación Superior -->
    <header class="bg-gray-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="image_b63323.jpg" alt="Logo EPET 6"
                    class="h-10 w-10 object-cover rounded-full border-2 border-lista-azul bg-white">
                <div>
                    <h1 class="text-xl font-bold leading-tight">Portal Delegados</h1>
                    <p class="text-xs text-blue-400 font-semibold tracking-wider">LISTA AZUL - EPET 6</p>
                </div>
            </div>
            <!-- Botón Secreto (Ícono) -->
            <i onclick="verificarCodigo()"
                class="fa-solid fa-user-tie text-2xl text-blue-400 cursor-pointer hover:text-white transition-colors"
                title="Acceso Admin"></i>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">

        <!-- ================= PANEL DE ADMINISTRADOR (OCULTO POR DEFECTO) ================= -->
        <section id="panel-admin"
            class="hidden fade-in mb-8 bg-blue-50 p-6 rounded-xl border-2 border-lista-azul shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-lg text-lista-azul"><i class="fa-solid fa-lock-open mr-2"></i>Crear Nuevo
                    Evento</h3>
                <button onclick="cerrarPanel()" class="text-gray-500 hover:text-red-500"><i
                        class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <form id="form-evento" class="space-y-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">MES (Ej: OCT)</label>
                        <input type="text" id="ev-mes" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul uppercase"
                            maxlength="3">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">DÍA (Ej: 15)</label>
                        <input type="number" id="ev-dia" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">HORA (Ej: 10:30)</label>
                        <input type="time" id="ev-hora" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">LUGAR</label>
                        <input type="text" id="ev-lugar" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">TÍTULO DEL EVENTO</label>
                    <input type="text" id="ev-titulo" required
                        class="w-full border rounded p-2 outline-none focus:border-lista-azul"
                        placeholder="Ej: Asamblea General">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">TEMARIO / DESCRIPCIÓN</label>
                    <textarea id="ev-temario" required rows="2"
                        class="w-full border rounded p-2 outline-none focus:border-lista-azul resize-none"></textarea>
                </div>
                <button type="submit"
                    class="w-full bg-lista-azul hover:bg-blue-800 text-white font-bold py-2 px-4 rounded transition-colors">
                    <i class="fa-solid fa-plus mr-2"></i> Publicar Evento
                </button>
            </form>
        </section>

        <!-- ================= LISTA DE EVENTOS ================= -->
        <div class="flex justify-between items-center mb-6 border-b-2 border-gray-200 pb-2">
            <h2 class="text-2xl font-bold text-gray-800">Agenda Oficial</h2>
        </div>

        <section id="contenedor-eventos" class="space-y-4">
            <!-- Evento de ejemplo por defecto -->
            <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-lista-azul slide-up flex gap-4">
                <div
                    class="flex flex-col items-center justify-center bg-blue-50 text-lista-azul rounded-lg p-3 min-w-[70px]">
                    <span class="text-sm font-bold uppercase">OCT</span>
                    <span class="text-2xl font-black">15</span>
                </div>
                <div class="flex-1">
                    <h3 class="text-lg font-bold text-gray-900">Reunión de Prueba</h3>
                    <p class="text-gray-600 text-sm mt-1"><i class="fa-solid fa-clock mr-1 text-gray-400"></i> 10:30 hs
                    </p>
                    <p class="text-gray-600 text-sm"><i class="fa-solid fa-location-dot mr-1 text-gray-400"></i>
                        Biblioteca</p>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-gray-100 text-gray-500 py-6 mt-auto border-t border-gray-200">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-xs">&copy; 2026 Centro de Estudiantes EPET N°6</p>
        </div>
    </footer>

    <!-- LÓGICA JAVASCRIPT -->
    <script>
        // 🔴 PEGA TU LINK DE SHEETDB ACÁ 🔴
        const SHEETDB_URL = "https://sheetdb.io/api/v1/zju3ai6vw34cs";

        // Función para pedir contraseña
        function verificarCodigo() {
            let codigo = prompt("Solo personal autorizado. Ingrese el código:");
            if (codigo === "1112") {
                document.getElementById('panel-admin').classList.remove('hidden');
            } else if (codigo !== null) {
                alert("Código incorrecto. Acceso denegado.");
            }
        }

        // Función para cerrar el panel
        function cerrarPanel() {
            document.getElementById('panel-admin').classList.add('hidden');
        }

        // ==========================================
        // 1. OBTENER LOS EVENTOS DE LA BASE DE DATOS
        // ==========================================
        async function cargarEventos() {
            const contenedor = document.getElementById('contenedor-eventos');
            contenedor.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-lista-azul"></i><p class="text-gray-500">Cargando agenda oficial...</p></div>';

            try {
                const respuesta = await fetch(SHEETDB_URL);
                const eventos = await respuesta.json(); // SheetDB devuelve un array JSON

                contenedor.innerHTML = ''; // Limpiamos el "Cargando..."

                if (eventos.length === 0) {
                    contenedor.innerHTML = '<p class="text-center text-gray-500 py-10">No hay eventos programados por ahora.</p>';
                    return;
                }

                // Recorremos los eventos y los mostramos al revés (para ver el último que agregaste primero)
                eventos.reverse().forEach(evento => {
                    // Verificar que no sea una fila vacía
                    if (evento.Titulo && evento.Titulo.trim() !== '') {
                        const tarjeta = `
                    <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-lista-azul slide-up flex gap-4 mb-4">
                        <div class="flex flex-col items-center justify-center bg-blue-50 text-lista-azul rounded-lg p-3 min-w-[70px]">
                            <span class="text-sm font-bold uppercase">${evento.Mes}</span>
                            <span class="text-2xl font-black">${evento.Dia}</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="text-lg font-bold text-gray-900">${evento.Titulo}</h3>
                            <p class="text-gray-600 text-sm mt-1"><i class="fa-solid fa-clock mr-1 text-gray-400"></i> ${evento.Hora} hs</p>
                            <p class="text-gray-600 text-sm"><i class="fa-solid fa-location-dot mr-1 text-gray-400"></i> ${evento.Lugar}</p>
                            <div class="mt-3 bg-gray-50 p-3 rounded border border-gray-100">
                                <p class="text-gray-700 text-sm font-semibold mb-1">Temario:</p>
                                <p class="text-gray-500 text-sm">${evento.Temario}</p>
                            </div>
                        </div>
                    </div>
                    `;
                        contenedor.insertAdjacentHTML('beforeend', tarjeta);
                    }
                });

            } catch (error) {
                contenedor.innerHTML = '<p class="text-center text-red-500 py-10">Hubo un error al conectar con la base de datos.</p>';
                console.error("Error obteniendo datos:", error);
            }
        }

        // ==========================================
        // 2. GUARDAR UN EVENTO NUEVO EN LA BASE
        // ==========================================
        document.getElementById('form-evento').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btnSubmit = document.querySelector('#form-evento button[type="submit"]');

            // Creamos el objeto exactamente con los mismos nombres que las columnas del Excel
            const nuevoEvento = {
                Mes: document.getElementById('ev-mes').value,
                Dia: document.getElementById('ev-dia').value,
                Hora: document.getElementById('ev-hora').value,
                Lugar: document.getElementById('ev-lugar').value,
                Titulo: document.getElementById('ev-titulo').value,
                Temario: document.getElementById('ev-temario').value
            };

            // Ponemos el botón en "Cargando"
            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Guardando...';
            btnSubmit.disabled = true;

            try {
                // Mandamos los datos a SheetDB usando POST
                const respuesta = await fetch(SHEETDB_URL, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    // SheetDB pide que mandemos el objeto adentro de una propiedad "data"
                    body: JSON.stringify({
                        data: [nuevoEvento]
                    })
                });

                if (respuesta.ok) {
                    // Si salió todo bien: vaciar formulario, cerrar panel y recargar eventos
                    document.getElementById('form-evento').reset();
                    cerrarPanel();
                    cargarEventos();
                    alert("¡El evento se guardó en la base de datos oficial!");
                } else {
                    alert("Error de conexión al guardar el evento.");
                }

            } catch (error) {
                alert("Error general. Revisá tu conexión a internet.");
                console.error(error);
            } finally {
                // Restaurar botón
                btnSubmit.innerHTML = '<i class="fa-solid fa-plus mr-2"></i> Publicar Evento';
                btnSubmit.disabled = false;
            }
        });

        // Ejecutar al entrar a la página por primera vez
        cargarEventos();
    </script>
</body>

</html>
