<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Delegados | EPET 6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bg-lista-azul {
            background-color: #1d4ed8;
        }

        .text-lista-azul {
            color: #1d4ed8;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <header class="bg-gray-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="image_b63323.jpg" alt="Logo EPET 6"
                    class="h-10 w-10 object-cover rounded-full border-2 border-lista-azul bg-white">
                <div>
                    <h1 class="text-xl font-bold leading-tight">Portal Delegados</h1>
                    <p class="text-xs text-blue-400 font-semibold tracking-wider">LISTA AZUL - EPET 6</p>
                </div>
            </div>
            <i onclick="abrirCreador()"
                class="fa-solid fa-plus-circle text-2xl text-blue-400 cursor-pointer hover:text-white transition-colors"
                title="Nuevo Evento"></i>
        </div>
    </header>

    <main class="flex-grow max-w-4xl mx-auto w-full px-4 py-8">

        <section id="panel-admin"
            class="hidden fade-in mb-8 bg-blue-50 p-6 rounded-xl border-2 border-lista-azul shadow-md">
            <div class="flex justify-between items-center mb-4">
                <h3 id="titulo-panel" class="font-bold text-lg text-lista-azul"><i
                        class="fa-solid fa-lock-open mr-2"></i>Crear Nuevo Evento</h3>
                <button onclick="cerrarPanel()" class="text-gray-500 hover:text-red-500"><i
                        class="fa-solid fa-xmark text-xl"></i></button>
            </div>

            <form id="form-evento" class="space-y-4">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">MES</label>
                        <select id="ev-mes" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul uppercase bg-white">
                            <option value="Enero">Enero</option>
                            <option value="Febrero">Febrero</option>
                            <option value="Marzo">Marzo</option>
                            <option value="Abril">Abril</option>
                            <option value="Mayo">Mayo</option>
                            <option value="Junio">Junio</option>
                            <option value="Julio">Julio</option>
                            <option value="Agosto">Agosto</option>
                            <option value="Septiembre">Septiembre</option>
                            <option value="Octubre">Octubre</option>
                            <option value="Noviembre">Noviembre</option>
                            <option value="Diciembre">Diciembre</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">DÍA</label>
                        <input type="number" id="ev-dia" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul" min="1" max="31">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">HORA (Ej: 10:30)</label>
                        <input type="text" id="ev-hora" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul" placeholder="00:00">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1">LUGAR</label>
                        <input type="text" id="ev-lugar" required
                            class="w-full border rounded p-2 outline-none focus:border-lista-azul">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">TÍTULO DEL EVENTO</label>
                    <input type="text" id="ev-titulo" required
                        class="w-full border rounded p-2 outline-none focus:border-lista-azul">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 mb-1">TEMARIO / DESCRIPCIÓN</label>
                    <textarea id="ev-temario" required rows="2"
                        class="w-full border rounded p-2 outline-none focus:border-lista-azul resize-none"></textarea>
                </div>
                <button type="submit" id="btn-submit-panel"
                    class="w-full bg-lista-azul hover:bg-blue-800 text-white font-bold py-2 px-4 rounded transition-colors">
                    <i class="fa-solid fa-plus mr-2"></i> Publicar Evento
                </button>
            </form>
        </section>

        <div class="flex justify-between items-center mb-6 border-b-2 border-gray-200 pb-2">
            <h2 class="text-2xl font-bold text-gray-800">Agenda Oficial</h2>
        </div>

        <section id="contenedor-eventos" class="space-y-4">
        </section>
    </main>

    <footer class="bg-gray-100 text-gray-500 py-6 mt-auto border-t border-gray-200">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <p class="text-xs">&copy; 2026 Centro de Estudiantes EPET N°6</p>
        </div>
    </footer>

    <script>
        const SHEETDB_URL = "https://sheetdb.io/api/v1/zju3ai6vw34cs";
        let eventosGlobales = [];

        // Variable para saber si estamos creando o editando
        let eventoEditandoId = null;

        // ==========================================
        // FUNCIONES DEL PANEL
        // ==========================================
        function abrirCreador() {
            let codigo = prompt("Solo personal autorizado. Ingrese el código:");
            if (codigo === "1112") {
                eventoEditandoId = null; // Modo creación
                document.getElementById('form-evento').reset();
                document.getElementById('titulo-panel').innerHTML = '<i class="fa-solid fa-calendar-plus mr-2"></i>Crear Nuevo Evento';
                document.getElementById('btn-submit-panel').innerHTML = '<i class="fa-solid fa-plus mr-2"></i>Publicar Evento';
                document.getElementById('panel-admin').classList.remove('hidden');
                window.scrollTo(0, 0);
            } else if (codigo !== null) {
                alert("Código incorrecto.");
            }
        }

        function abrirEditor(index) {
            let codigo = prompt("Código de administrador para editar:");
            if (codigo === "1112") {
                const evento = eventosGlobales[index];
                eventoEditandoId = evento.id; // Modo edición

                // Llenar el formulario con los datos actuales
                document.getElementById('ev-mes').value = evento.Mes;
                document.getElementById('ev-dia').value = evento.Dia;
                document.getElementById('ev-hora').value = evento.Hora;
                document.getElementById('ev-lugar').value = evento.Lugar;
                document.getElementById('ev-titulo').value = evento.Titulo;
                document.getElementById('ev-temario').value = evento.Temario;

                // Cambiar textos del panel
                document.getElementById('titulo-panel').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>Editar Evento';
                document.getElementById('btn-submit-panel').innerHTML = '<i class="fa-solid fa-save mr-2"></i>Guardar Cambios';

                document.getElementById('panel-admin').classList.remove('hidden');
                window.scrollTo(0, 0); // Sube la pantalla arriba de todo
            } else if (codigo !== null) {
                alert("Código incorrecto.");
            }
        }

        function cerrarPanel() {
            document.getElementById('panel-admin').classList.add('hidden');
            eventoEditandoId = null;
        }

        // ==========================================
        // DESCARGAR CALENDARIO (.ICS)
        // ==========================================
        function descargarICS(index) {
            const evento = eventosGlobales[index];
            const MESES_NUM = { "ENERO": "01", "FEBRERO": "02", "MARZO": "03", "ABRIL": "04", "MAYO": "05", "JUNIO": "06", "JULIO": "07", "AGOSTO": "08", "SEPTIEMBRE": "09", "OCTUBRE": "10", "NOVIEMBRE": "11", "DICIEMBRE": "12" };

            const mesText = evento.Mes ? evento.Mes.trim().toUpperCase() : "ENERO";
            const mesNum = MESES_NUM[mesText] || "01";
            const diaNum = evento.Dia;

            let horaStr = evento.Hora || "00:00";
            if (!horaStr.includes(':')) horaStr = "00:00";
            let [h, m] = horaStr.split(':');

            const fechaInicio = new Date(2026, parseInt(mesNum) - 1, parseInt(diaNum), parseInt(h), parseInt(m));
            const fechaFin = new Date(fechaInicio.getTime() + (60 * 60 * 1000));

            const formatoICS = (fecha) => {
                const pad = (n) => String(n).padStart(2, '0');
                return `${fecha.getFullYear()}${pad(fecha.getMonth() + 1)}${pad(fecha.getDate())}T${pad(fecha.getHours())}${pad(fecha.getMinutes())}00`;
            };

            const icsMSG =
                "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//EPET6//CentroEstudiantes//ES\nBEGIN:VEVENT\n" +
                "DTSTART:" + formatoICS(fechaInicio) + "\n" +
                "DTEND:" + formatoICS(fechaFin) + "\n" +
                "SUMMARY:EPET 6: " + evento.Titulo + "\n" +
                "DESCRIPTION:" + evento.Temario.replace(/\n/g, '\\n') + "\n" +
                "LOCATION:" + evento.Lugar + "\n" +
                "END:VEVENT\nEND:VCALENDAR";

            const blob = new Blob([icsMSG], { type: 'text/calendar;charset=utf-8' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "evento_epet6.ics";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        }

        // ==========================================
        // BORRAR UN EVENTO
        // ==========================================
        async function borrarEvento(id) {
            let codigo = prompt("Código de administrador para borrar:");
            if (codigo !== "1112") return;
            if (!confirm("¿Seguro que querés borrar este evento?")) return;

            document.body.style.cursor = 'wait';
            try {
                const respuesta = await fetch(`${SHEETDB_URL}/id/${id}`, { method: 'DELETE' });
                if (respuesta.ok) {
                    cargarEventos();
                } else {
                    alert("Hubo un error al borrar.");
                }
            } catch (error) {
                alert("Error de conexión.");
            } finally {
                document.body.style.cursor = 'default';
            }
        }

        // ==========================================
        // CARGAR EVENTOS
        // ==========================================
        async function cargarEventos() {
            const contenedor = document.getElementById('contenedor-eventos');
            contenedor.innerHTML = '<div class="text-center py-10"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-lista-azul"></i><p class="text-gray-500">Cargando agenda...</p></div>';

            try {
                const respuesta = await fetch(SHEETDB_URL);
                const eventos = await respuesta.json();

                contenedor.innerHTML = '';
                eventosGlobales = [];

                if (eventos.length === 0 || eventos.error) {
                    contenedor.innerHTML = '<p class="text-center text-gray-500 py-10">No hay eventos programados.</p>';
                    return;
                }

                eventos.reverse().forEach(evento => {
                    if (evento.Titulo && evento.Titulo.trim() !== '') {

                        eventosGlobales.push(evento);
                        const arrayIndex = eventosGlobales.length - 1;

                        const tarjeta = `
                        <div class="bg-white rounded-xl shadow-sm p-5 border-l-4 border-lista-azul slide-up flex flex-col gap-4 mb-4 relative">
                            
                            <div class="absolute top-3 right-3 flex gap-3">
                                <button onclick="abrirEditor(${arrayIndex})" class="text-gray-300 hover:text-blue-500 transition-colors" title="Editar evento">
                                    <i class="fa-solid fa-pen text-lg"></i>
                                </button>
                                <button onclick="borrarEvento('${evento.id}')" class="text-gray-300 hover:text-red-500 transition-colors" title="Borrar evento">
                                    <i class="fa-solid fa-trash text-lg"></i>
                                </button>
                            </div>

                            <div class="flex gap-4 pr-16">
                                <div class="flex flex-col items-center justify-center bg-blue-50 text-lista-azul rounded-lg p-3 min-w-[70px] h-fit">
                                    <span class="text-xs font-bold uppercase tracking-wider">${evento.Mes.substring(0, 3)}</span>
                                    <span class="text-2xl font-black">${evento.Dia}</span>
                                </div>
                                <div class="flex-1">
                                    <h3 class="text-lg font-bold text-gray-900">${evento.Titulo}</h3>
                                    <p class="text-gray-600 text-sm mt-1"><i class="fa-solid fa-clock mr-1 text-gray-400"></i> ${evento.Hora} hs</p>
                                    <p class="text-gray-600 text-sm"><i class="fa-solid fa-location-dot mr-1 text-gray-400"></i> ${evento.Lugar}</p>
                                    <div class="mt-3 bg-gray-50 p-3 rounded border border-gray-100">
                                        <p class="text-gray-700 text-sm font-semibold mb-1">Temario:</p>
                                        <p class="text-gray-500 text-sm whitespace-pre-wrap">${evento.Temario}</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="border-t border-gray-100 pt-3">
                                <button onclick="descargarICS(${arrayIndex})" class="w-full flex justify-center items-center bg-gray-50 hover:bg-gray-100 text-gray-700 font-semibold py-2 px-4 border border-gray-200 rounded-lg shadow-sm transition-all text-sm">
                                    <i class="fa-regular fa-calendar-plus text-lista-azul mr-2 text-lg"></i> Agendar Recordatorio
                                </button>
                            </div>
                        </div>
                        `;
                        contenedor.insertAdjacentHTML('beforeend', tarjeta);
                    }
                });

            } catch (error) {
                contenedor.innerHTML = '<p class="text-center text-red-500 py-10">Hubo un error al conectar con la base.</p>';
            }
        }

        // ==========================================
        // GUARDAR (CREAR O EDITAR)
        // ==========================================
        document.getElementById('form-evento').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-submit-panel');

            // Recolectar datos del formulario
            const datosEvento = {
                Mes: document.getElementById('ev-mes').value,
                Dia: document.getElementById('ev-dia').value,
                Hora: document.getElementById('ev-hora').value,
                Lugar: document.getElementById('ev-lugar').value,
                Titulo: document.getElementById('ev-titulo').value,
                Temario: document.getElementById('ev-temario').value
            };

            btnSubmit.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Guardando...';
            btnSubmit.disabled = true;

            try {
                if (eventoEditandoId) {
                    // MODO EDICIÓN (PATCH)
                    const respuesta = await fetch(`${SHEETDB_URL}/id/${eventoEditandoId}`, {
                        method: 'PATCH',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: datosEvento })
                    });
                    if (respuesta.ok) {
                        cerrarPanel();
                        cargarEventos();
                    } else {
                        alert("Error al editar el evento.");
                    }
                } else {
                    // MODO CREACIÓN (POST)
                    datosEvento.id = "EV-" + Date.now(); // Generar DNI nuevo
                    const respuesta = await fetch(SHEETDB_URL, {
                        method: 'POST',
                        headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: [datosEvento] })
                    });
                    if (respuesta.ok) {
                        cerrarPanel();
                        cargarEventos();
                    } else {
                        alert("Error al crear el evento.");
                    }
                }
            } catch (error) {
                alert("Error de conexión al guardar.");
            } finally {
                btnSubmit.disabled = false;
            }
        });

        cargarEventos();
    </script>
</body>

</html>
